    <title>Zara's Plate</title>
    <style>
      /* Full-bleed dark background — kill the default body margin (the light frame)
         and paint html/body the app's dark so no light shows in margins or the

         body into a scroll container and break the sticky left column. */
      html, body { margin: 0; padding: 0; background: #20242B; }
    </style>
